name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test_python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,viz]"

    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        black --check src/ tests/

    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports
      continue-on-error: true

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  web_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/web
      run: npm ci

    - name: Lint
      working-directory: ./apps/web
      run: npm run lint

    - name: Test
      working-directory: ./apps/web
      run: npm run test

    - name: Build
      working-directory: ./apps/web
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: "http://localhost:8000" # Placeholder for build
        NEXT_PUBLIC_API_KEY: "build-key"

  build_api:
    runs-on: ubuntu-latest
    needs: [test_python, web_test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -f backend/Dockerfile -t cardio-api:latest backend

    - name: Test Docker image
      run: |
        docker run -d -p 8000:8000 --name test-api -e APP_ENV=development cardio-api:latest
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        docker stop test-api
        docker rm test-api

  deploy:
    runs-on: ubuntu-latest
    needs: build_api
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Trigger Railway deploys
      # Railway's GitHub integration can auto-deploy on push with zero CI
      # involvement; this job is for teams that specifically want deploys
      # gated behind CI passing first. Configure a Deploy Hook URL per
      # service in Railway's dashboard (Settings -> Deploy Triggers) and
      # store them as repo secrets -- steps no-op harmlessly if unset.
      run: |
        if [ -n "${{ secrets.RAILWAY_API_DEPLOY_HOOK }}" ]; then
          curl -fsSL -X POST "${{ secrets.RAILWAY_API_DEPLOY_HOOK }}"
        else
          echo "RAILWAY_API_DEPLOY_HOOK not set, skipping (Railway's GitHub auto-deploy may already handle this)"
        fi
        if [ -n "${{ secrets.RAILWAY_WEB_DEPLOY_HOOK }}" ]; then
          curl -fsSL -X POST "${{ secrets.RAILWAY_WEB_DEPLOY_HOOK }}"
        else
          echo "RAILWAY_WEB_DEPLOY_HOOK not set, skipping"
        fi
